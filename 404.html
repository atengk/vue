<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Loading...</title>

  <style>
    /* 整体布局 */
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a; /* 深色高级感 */
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
      overflow: hidden;
    }

    /* 中心容器 */
    .container {
      text-align: center;
      opacity: 0;
      transform: translateY(10px);
      animation: fadeIn 0.4s ease forwards;
    }

    /* loading 动画 */
    .loader {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top: 3px solid #38bdf8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    /* 文案 */
    .text {
      font-size: 14px;
      letter-spacing: 0.08em;
      opacity: 0.8;
    }

    /* 动画定义 */
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>

  <script>
    (function () {
      var targetBase = "https://atengk.github.io/Ateng-Vue";

      var path = window.location.pathname;
      var target = targetBase + path;

      if (window.location.search) target += window.location.search;
      if (window.location.hash) target += window.location.hash;

      // 让动画至少展示 120ms，避免“闪一下”
      setTimeout(function () {
        window.location.replace(target);
      }, 120);
    })();
  </script>
</head>

<body>
  <div class="container">
    <div class="loader"></div>
    <div class="text">LOADING</div>
  </div>
</body>
</html>
